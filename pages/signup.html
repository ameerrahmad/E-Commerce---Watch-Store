<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ChronoLux</title>
  <meta name="description" content="Join ChronoLux and explore our exclusive collection of Swiss luxury watches." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <nav>
    <a href="../index.html">ChronoLux</a>
    <button class="menu-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
    <ul id="nav-menu">
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Collection</a></li>
      <li class="dropdown">
        <a href="#">Discover ▾</a>
        <div class="dropdown-menu">
          <a href="services.html">Services</a>
          <a href="about.html">Our Story</a>
        </div>
      </li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li>
        <a href="cart.html" class="cart-link">
          🛒 <span id="cart-badge" class="cart-badge">0</span>
        </a>
      </li>
      <li><button id="dark-mode-btn" class="tiny-button border-button">🌙</button></li>
    </ul>
  </nav>

  <div class="form-container form-container--padded">
    <div class="form-header">
      <a href="../index.html" class="form-logo">ChronoLux</a>
      <p class="form-tagline">Create your account</p>
    </div>

    <form id="signup-form" onsubmit="event.preventDefault(); if(validateForm('signup-form')) showToast('Account created! Welcome to ChronoLux.');">
      <div class="signup-row">
        <div class="signup-col">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" placeholder="Jean" required />
          <span class="field-error">Required.</span>
        </div>
        <div class="signup-col">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" placeholder="Dupont" required />
          <span class="field-error">Required.</span>
        </div>
      </div>
      <div>
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required />
        <span class="field-error">Valid email required.</span>
      </div>
      <div>
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" />
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
        <span class="field-error">Password required.</span>
      </div>
      <div>
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat password" required />
        <span class="field-error">Passwords must match.</span>
      </div>
      <div>
        <label for="country">Country</label>
        <div class="select-container">
          <select id="country" name="country">
            <option value="">Select country…</option>
            <option>Switzerland</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>France</option>
            <option>Germany</option>
            <option>Japan</option>
            <option>UAE</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="terms-wrap">
        <label class="terms-label">
          <input type="checkbox" id="terms" class="terms-checkbox" required />
          I agree to the <a href="#" class="terms-link">Terms of Service</a>&nbsp;&amp;&nbsp;<a href="#">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" class="btn-full">Create Account</button>
      <p class="form-footer">
        Already have an account? <a href="login.html">Sign in →</a>
      </p>
    </form>
  </div>

  <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
