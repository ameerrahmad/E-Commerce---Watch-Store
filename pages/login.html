<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ChronoLux</title>
  <meta name="description" content="Sign in to your ChronoLux account to manage orders and your watch collection." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <nav>
    <a href="../index.html">ChronoLux</a>
    <button class="menu-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
    <ul id="nav-menu">
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Collection</a></li>
      <li class="dropdown">
        <a href="#">Discover ▾</a>
        <div class="dropdown-menu">
          <a href="services.html">Services</a>
          <a href="about.html">Our Story</a>
        </div>
      </li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li>
        <a href="cart.html" class="cart-link">
          🛒 <span id="cart-badge" class="cart-badge">0</span>
        </a>
      </li>
      <li><button id="dark-mode-btn" class="tiny-button border-button">🌙</button></li>
    </ul>
  </nav>

  <div class="form-container">
    <div class="form-header">
      <a href="../index.html" class="form-logo">ChronoLux</a>
      <p class="form-tagline">Welcome back. Please sign in.</p>
    </div>

    <form id="login-form" onsubmit="event.preventDefault(); if(validateForm('login-form')) showToast('Signed in successfully!');">
      <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
        <span class="field-error">Email is required.</span>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
        <span class="field-error">Password is required.</span>
      </div>
      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" id="remember-me" class="checkbox-auto" /> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-full">Sign In</button>
      <p class="form-footer">
        Don't have an account? <a href="signup.html">Create one →</a>
      </p>
    </form>
  </div>

  <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
