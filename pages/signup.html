<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ChronoLux</title>
  <meta name="description" content="Join ChronoLux and explore our exclusive collection of Swiss luxury watches." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <nav>
    <a href="../index.html">ChronoLux</a>
    <button class="menu-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
    <ul id="nav-menu">
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Collection</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button id="dark-mode-btn" class="tiny-button border-button">🌙</button></li>
    </ul>
  </nav>

  <div class="form-container" style="padding:48px 20px;">
    <div style="text-align:center;margin-bottom:32px;">
      <a href="../index.html" style="font-size:1.8rem;font-weight:700;letter-spacing:0.12em;color:var(--brand-third-color);text-transform:uppercase;">ChronoLux</a>
      <p style="margin-top:8px;color:var(--text-muted-color);font-size:0.9rem;">Create your account</p>
    </div>

    <form id="signup-form" onsubmit="event.preventDefault(); if(validateForm('signup-form')) showToast('Account created! Welcome to ChronoLux.');">
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div style="flex:1;min-width:140px;">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" placeholder="Jean" required />
          <span class="field-error" style="display:none;color:#E05555;font-size:0.78rem;">Required.</span>
        </div>
        <div style="flex:1;min-width:140px;">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" placeholder="Dupont" required />
          <span class="field-error" style="display:none;color:#E05555;font-size:0.78rem;">Required.</span>
        </div>
      </div>
      <div>
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required />
        <span class="field-error" style="display:none;color:#E05555;font-size:0.78rem;">Valid email required.</span>
      </div>
      <div>
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" />
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
        <span class="field-error" style="display:none;color:#E05555;font-size:0.78rem;">Password required.</span>
      </div>
      <div>
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat password" required />
        <span class="field-error" style="display:none;color:#E05555;font-size:0.78rem;">Passwords must match.</span>
      </div>
      <div>
        <label for="country">Country</label>
        <div class="select-container">
          <select id="country" name="country">
            <option value="">Select country…</option>
            <option>Switzerland</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>France</option>
            <option>Germany</option>
            <option>Japan</option>
            <option>UAE</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:24px;">
        <label style="display:flex;align-items:flex-start;gap:8px;text-transform:none;font-size:0.85rem;letter-spacing:0;cursor:pointer;font-weight:400;">
          <input type="checkbox" id="terms" style="width:auto;margin-top:3px;" required />
          I agree to the <a href="#" style="margin-left:4px;">Terms of Service</a>&nbsp;&amp;&nbsp;<a href="#">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" style="width:100%;">Create Account</button>
      <p style="text-align:center;margin-top:20px;font-size:0.88rem;">
        Already have an account? <a href="login.html">Sign in →</a>
      </p>
    </form>
  </div>

  <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
